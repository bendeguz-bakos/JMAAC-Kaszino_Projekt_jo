<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félkarú-rabló</title>
</head>

<body>
    <input type="number" id="tet" min="0">
    <button type="button" onclick="start(event)">Játék</button>

    <div>
        <span id="elso_kep">🇭🇺</span>
        <span id="masodik_kep">🇭🇺</span>
        <span id="hamradik_kep">🇭🇺</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        let spinning = false;
        async function start(event) {
            event.preventDefault();

            if (spinning) {
                return;
            }

            spinning = true;

            const userid = localStorage.getItem("userid");
            if (userid === null) {
                Swal.fire({
                    title: 'Nem vagz bejelentkezve!',
                    text: 'Jelentkezzbe itt',
                    icon: 'error',
                    confirmButtonText: "Bejelentkezes"
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "loginer.html";
                    }
                });
                spinning = false;
                return;
            }

            const tet = document.getElementById("tet").value
            const res = await fetch(`http://localhost:3000/users/${userid}`);
            const v_fiok = await res.json();

            if (!tet || tet <= 0) {
                Swal.fire({
                    title: 'Meg kell adnod a tetet!',
                    text: 'Ird be a fogadasi osszeg',
                    icon: 'warning',
                    confirmButtonText: "Oke"
                });
                spinning = false;
                return;
            }

            if (tet > v_fiok.balance) {
                Swal.fire({
                    title: 'Sajnos nincs elég fedezet a fiókodon',
                    text: 'De feltölthetsz az alábbi gombal',
                    icon: 'error',
                    confirmButtonText: "Töltök fel pénzt"
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "topup.html";
                    }
                });
                spinning = false;
                return;
            }

            const emojis = ["🍒", "🍋", "🍊", "🍇", "⭐", "🪙", "💎", "7️⃣", "🇭🇺"];

            function szam_to_emoji(ertek) {
                if (ertek <= 14) return "🍒";
                else if (ertek <= 29) return "🍋";
                else if (ertek <= 44) return "🍊";
                else if (ertek <= 59) return "🍇";
                else if (ertek <= 70) return "⭐";
                else if (ertek <= 80) return "🪙";
                else if (ertek <= 88) return "💎";
                else if (ertek <= 97) return "7️⃣";
                else return "🇭🇺";
            }

            function szorzo_szamlalo(sorozat) {
                if (sorozat[0] === sorozat[1] && sorozat[1] === sorozat[2]) {
                    if (sorozat.includes("⭐")) {
                        return 1.5
                    } else if (sorozat.includes("🪙")) {
                        return 1.75
                    } else if (sorozat.includes("💎")) {
                        return 2
                    } else if (sorozat.includes("7️⃣")) {
                        return 3
                    } else if (sorozat.includes("🇭🇺")) {
                        return 10
                    }
                    else {
                        return 1.2
                    }
                }
                else if (sorozat.filter(e => e === "🍒").length === 2) {
                    return 1
                } else if (sorozat.filter(e => e === "🍇").length === 2) {
                    return 1
                } else if (sorozat.filter(e => e === "🍋").length === 2) {
                    return 1
                } else if (sorozat.filter(e => e === "🍊").length === 2) {
                    return 1
                } else if (sorozat.filter(e => e === "⭐").length === 2) {
                    return 1.15
                } else if (sorozat.filter(e => e === "🪙").length === 2) {
                    return 1.25
                } else if (sorozat.filter(e => e === "💎").length === 2) {
                    return 1.35
                } else if (sorozat.filter(e => e === "7️⃣").length === 2) {
                    return 2
                } else if (sorozat.filter(e => e === "🇭🇺").length === 2) {
                    return 3
                } else return 0
            }
            const elso_ertek = Math.floor(Math.random() * 101);
            const masodik_ertek = Math.floor(Math.random() * 101);
            const harmadik_ertek = Math.floor(Math.random() * 101);
            const vegso = [szam_to_emoji(elso_ertek), szam_to_emoji(masodik_ertek), szam_to_emoji(harmadik_ertek)]
            console.log(vegso)
            console.log(szorzo_szamlalo(vegso))
            const ujbalance = v_fiok.balance - tet + (tet * szorzo_szamlalo(vegso))
            await fetch(`http://localhost:3000/users/${userid}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ balance: ujbalance })
            });

            function porgetes(kep, emojivegen, dur) {
                const idozito = setInterval(() => {
                    kep.innerHTML = emojis[Math.floor(Math.random() * emojis.length)]

                }, 50)
                setTimeout(async () => {
                    clearInterval(idozito);
                    kep.innerHTML = emojivegen;
                    await wait(1500)
                    spinning = false
                }, dur);
            }
            porgetes(document.getElementById("elso_kep"), vegso[0], 1500)
            porgetes(document.getElementById("masodik_kep"), vegso[1], 2000)
            porgetes(document.getElementById("hamradik_kep"), vegso[2], 2500)
            await wait(2750)

            const profit = ujbalance - v_fiok.balance

            if (profit > 0) {
                Swal.fire({
                    title: 'Nyertel!',
                    icon: 'success',
                    text: `+${profit} Ft-t`,
                    confirmButtonText: 'oke'
                })
            } else if (profit === 0) {
                Swal.fire({
                    title: 'Döntetlen!',
                    icon: 'info',
                    text: 'Visszakaptad a tetedet',
                    confirmButtonText: 'oke'
                })
            } else {
                Swal.fire({
                    title: 'Veszítettél!',
                    icon: 'error',
                    text: `${profit} Ft-t`,
                    confirmButtonText: 'oke'
                })
            }


        }
    </script>
</body>

</html>
