<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Félkarú-rabló</title>
    <link rel="stylesheet" href="dashboard(5).css">
    <style>
        #slots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        #slots span {
            font-size: 52px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>
    <div id="wrapper">
        <div id="sidebar">
            <h2>Adatlap</h2>
            <p id="nev"></p>
            <p id="egyenleg"></p>
            <button type="button" onclick="window.location.href='dashboard.html'">Vissza</button>
            <button type="button" onclick="logout()">Kijelentkezes</button>
        </div>

        <div id="content">
            <h1>Félkarú-rabló</h1>

            <div class="card" style="max-width: 420px;">
                <p>Tét:</p>
                <input type="number" id="tet" min="0" placeholder="Fogadás összege">
                <button type="button" id="jatekgomb" style="margin-top: 10px; width: 100%;">Játék</button>
            </div>

            <div class="card" style="max-width: 420px; margin-top: 20px;">
                <div id="slots">
                    <span id="elso_kep">🎰</span>
                    <span id="masodik_kep">🎰</span>
                    <span id="hamradik_kep">🎰</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener("DOMContentLoaded", betolets)

        document.getElementById("jatekgomb").addEventListener("click", start)

        async function betolets() {
            const userid = localStorage.getItem("userid")
            if (!userid) return
            const resp = await fetch(`http://localhost:3000/users/${userid}`)
            const user = await resp.json()
            document.getElementById('nev').textContent = user.username
            document.getElementById('egyenleg').textContent = user.balance + ' Ft'
        }

        function logout() {
            localStorage.removeItem("userid")
            window.location.href = "landingpage.html"
        }

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms))
        let spinning = false

        async function start() {
            if (spinning) return
            spinning = true

            const userid = localStorage.getItem("userid")
            if (!userid) {
                Swal.fire({
                    title: 'Nem vagy bejelentkezve!',
                    icon: 'error',
                    confirmButtonText: "Bejelentkezes"
                }).then((result) => {
                    if (result.isConfirmed) window.location.href = "loginer.html"
                })
                spinning = false
                return
            }

            const tet = Number(document.getElementById("tet").value)
            const res = await fetch(`http://localhost:3000/users/${userid}`)
            const v_fiok = await res.json()
            const balance = Number(v_fiok.balance)

            if (!tet || tet <= 0) {
                Swal.fire({ title: 'Meg kell adnod a tetet!', icon: 'warning', confirmButtonText: "Oke" })
                spinning = false
                return
            }

            if (tet > balance) {
                Swal.fire({ title: 'Nincs elég fedezet!', icon: 'error', confirmButtonText: "Feltöltés" })
                    .then((result) => { if (result.isConfirmed) window.location.href = "topup.html" })
                spinning = false
                return
            }

            const emojis = ["🍒", "🍋", "🍊", "🍇", "⭐", "🪙", "💎", "7️⃣", "🇭🇺"]

            function szam_to_emoji(ertek) {
                if (ertek <= 14) return "🍒"
                else if (ertek <= 29) return "🍋"
                else if (ertek <= 44) return "🍊"
                else if (ertek <= 59) return "🍇"
                else if (ertek <= 70) return "⭐"
                else if (ertek <= 80) return "🪙"
                else if (ertek <= 88) return "💎"
                else if (ertek <= 97) return "7️⃣"
                else return "🇭🇺"
            }

            function szorzo_szamlalo(sorozat) {
                if (sorozat[0] === sorozat[1] && sorozat[1] === sorozat[2]) {
                    if (sorozat.includes("⭐")) return 1.5
                    else if (sorozat.includes("🪙")) return 1.75
                    else if (sorozat.includes("💎")) return 2
                    else if (sorozat.includes("7️⃣")) return 3
                    else if (sorozat.includes("🇭🇺")) return 10
                    else return 1.2
                }
                else if (sorozat.filter(e => e === "🍒").length === 2) return 1
                else if (sorozat.filter(e => e === "🍇").length === 2) return 1
                else if (sorozat.filter(e => e === "🍋").length === 2) return 1
                else if (sorozat.filter(e => e === "🍊").length === 2) return 1
                else if (sorozat.filter(e => e === "⭐").length === 2) return 1.15
                else if (sorozat.filter(e => e === "🪙").length === 2) return 1.25
                else if (sorozat.filter(e => e === "💎").length === 2) return 1.35
                else if (sorozat.filter(e => e === "7️⃣").length === 2) return 2
                else if (sorozat.filter(e => e === "🇭🇺").length === 2) return 3
                else return 0
            }

            const vegso = [
                szam_to_emoji(Math.floor(Math.random() * 101)),
                szam_to_emoji(Math.floor(Math.random() * 101)),
                szam_to_emoji(Math.floor(Math.random() * 101))
            ]

            const ujbalance = balance - tet + (tet * szorzo_szamlalo(vegso))

            await fetch(`http://localhost:3000/users/${userid}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ balance: ujbalance })
            })

            function porgetes(kep, emojivegen, dur) {
                const idozito = setInterval(() => {
                    kep.innerHTML = emojis[Math.floor(Math.random() * emojis.length)]
                }, 50)
                setTimeout(() => {
                    clearInterval(idozito)
                    kep.innerHTML = emojivegen
                }, dur)
            }

            porgetes(document.getElementById("elso_kep"), vegso[0], 1500)
            porgetes(document.getElementById("masodik_kep"), vegso[1], 2000)
            porgetes(document.getElementById("hamradik_kep"), vegso[2], 2500)

            await wait(2750)
            spinning = false

            document.getElementById('egyenleg').textContent = ujbalance + ' Ft'

            const profit = ujbalance - balance
            if (profit > 0) {
                Swal.fire({ title: 'Nyertél!', icon: 'success', text: `+${profit} Ft`, confirmButtonText: 'Oke' })
            } else if (profit === 0) {
                Swal.fire({ title: 'Döntetlen!', icon: 'info', text: 'Visszakaptad a tétedet', confirmButtonText: 'Oke' })
            } else {
                Swal.fire({ title: 'Veszítettél!', icon: 'error', text: `${profit} Ft`, confirmButtonText: 'Oke' })
            }
        }
    </script>
</body>

</html>
