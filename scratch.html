<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="scratch.css" rel="stylesheet">
</head>

<body>
    <div class="scratch text-center p-5">
        <!-- use auto-width columns and center the row so cells stay in the middle on narrow viewports -->
        <div class="row justify-content-center">
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
            <div class="col-auto cella"> <span class="prize"></span>
                <div class="cover"></div>
            </div>
        </div>
    </div>
    <script>
        // initialize game: pick one random cell to hide a star
        document.addEventListener('DOMContentLoaded', () => {
            const maxClicks = 3;
            let clicks = 0;
            const clickedCells = [];

            const cells = Array.from(document.querySelectorAll('.cella'));
            const starIndex = Math.floor(Math.random() * cells.length);
            const starCell = cells[starIndex];
            const starSpan = starCell.querySelector('.prize');
            if (starSpan) {
                starSpan.textContent = '⭐';
            } else {
                const span = document.createElement('span');
                span.className = 'prize';
                span.textContent = '⭐';
                starCell.appendChild(span);
            }

            cells.forEach(cell => {
                cell.addEventListener('click', () => {
                    if (cell.classList.contains('clicked') || clicks >= maxClicks) {
                        return;
                    }

                    clicks++;
                    cell.classList.add('clicked');
                    clickedCells.push(cell);

                    const cover = cell.querySelector('.cover');
                    if (cover) {
                        cover.remove();
                    }

                    if (cell === starCell) {
                        alert('You clicked the star!');
                    }

                    console.log(`Cell clicked (${clicks}/${maxClicks})`, cell);
                    console.log('Cells so far:', clickedCells);

                    if (clicks === maxClicks) {
                        console.log('Maximum number of clicks reached');
                    }
                });
            });
        });
    </script>
</body>

</html>
